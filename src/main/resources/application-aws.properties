# ไฟล์นี้ถูกสร้างขึ้นเพื่อใช้เชื่อมต่อกับ Database บน EC2 
# เพื่อไม่ให้กระทบกับการทำงานบน localhost เดิม (Seamless & Robust)

spring.datasource.url=jdbc:mysql://ec2-18-141-181-179.ap-southeast-1.compute.amazonaws.com:3306/morphoaid_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=morphoaid_user
