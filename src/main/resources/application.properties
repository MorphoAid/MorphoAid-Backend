spring.application.name=morphoaid-backend

spring.datasource.url=jdbc:mysql://localhost:3306/morphoaid_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=operton009
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8081

logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.hibernate.engine.jdbc.env.internal=DEBUG

# Ultralytics AI Integration
ultralytics.base-url=https://predict.ultralytics.com
ultralytics.api-key=${ULTRALYTICS_API_KEY}

# AWS S3 Configuration
aws.s3.bucket=${AWS_S3_BUCKET:morphoaid-data}
aws.s3.region=${AWS_S3_REGION:us-east-1}

# File Upload Limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.storage.allowed-mimes=image/png,image/jpeg
